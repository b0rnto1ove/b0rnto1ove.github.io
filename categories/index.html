﻿<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!window.CONFIG || !CONFIG.page || !CONFIG.page.isHome) return;

  const body = document.body;
  const mainInner = document.querySelector('.main-inner');
  const contentWrap = document.querySelector('.content-wrap');
  const postBlocks = [...document.querySelectorAll('.content.index .post-block')];

  if (!mainInner || !contentWrap || !postBlocks.length) return;

  body.classList.add('is-home-enhanced');

  const heartSvg = '<svg class="empty" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"></path></svg><svg class="filled" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"></path></svg>';

  const hero = document.createElement('section');
  hero.className = 'home-landing';
  hero.innerHTML = `
    <div class="home-landing__bg"></div>
    <div class="home-landing__overlay"></div>
    <div class="home-landing__content">
      <div class="home-landing__copy">
        <p class="home-landing__eyebrow">Home</p>
        <h1 class="home-landing__title">b0rnto1ove</h1>
        <p class="home-landing__subtitle">好事多磨</p>
        <button class="home-landing__button" id="home-open-posts" type="button" aria-label="查看全部文章">
          ${heartSvg}
          查看全部文章
        </button>
      </div>
    </div>
  `;

  mainInner.insertBefore(hero, contentWrap);

  const cards = postBlocks.map(post => {
    const link = post.querySelector('.post-title-link');
    const time = post.querySelector('time');
    const bodyText = post.querySelector('.post-body');
    const href = link ? link.getAttribute('href') : '#';
    const title = link ? link.textContent.trim() : '未命名文章';
    const date = time ? time.textContent.trim() : '';
    const excerptText = bodyText ? bodyText.textContent.replace(/\s+/g, ' ').trim() : '';
    const excerpt = excerptText.slice(0, 120);

    return `
      <article class="home-post-card">
        <p class="home-post-card__meta">${date}</p>
        <a class="home-post-card__title" href="${href}">${title}</a>
        <p class="home-post-card__excerpt">${excerpt}${excerptText.length > 120 ? '...' : ''}</p>
      </article>
    `;
  }).join('');

  const panel = document.createElement('section');
  panel.className = 'home-posts-panel';
  panel.setAttribute('aria-hidden', 'true');
  panel.innerHTML = `
    <div class="home-posts-panel__backdrop" id="home-close-posts-backdrop"></div>
    <div class="home-posts-panel__dialog">
      <div class="home-posts-panel__header">
        <div>
          <p class="home-posts-panel__kicker">Posts</p>
          <h2 class="home-posts-panel__title">这里放你写的所有文章</h2>
        </div>
        <button class="home-posts-panel__close" id="home-close-posts-button" type="button">关闭</button>
      </div>
      <div class="home-posts-panel__grid">
        ${cards}
      </div>
    </div>
  `;

  body.appendChild(panel);

  const openButton = document.getElementById('home-open-posts');
  const closeButton = document.getElementById('home-close-posts-button');
  const closeBackdrop = document.getElementById('home-close-posts-backdrop');

  const openPanel = () => {
    panel.classList.add('is-open');
    panel.setAttribute('aria-hidden', 'false');
  };

  const closePanel = () => {
    panel.classList.remove('is-open');
    panel.setAttribute('aria-hidden', 'true');
  };

  openButton.addEventListener('click', openPanel);
  closeButton.addEventListener('click', closePanel);
  closeBackdrop.addEventListener('click', closePanel);

  window.addEventListener('keydown', event => {
    if (event.key === 'Escape' && panel.classList.contains('is-open')) {
      closePanel();
    }
  });
});
</script>
